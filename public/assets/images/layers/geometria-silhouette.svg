<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" stroke="#B8E0C8" stroke-width="1" opacity="0.08">
  <!-- Cubo isometrico -->
  <polygon points="200,40 360,120 360,280 200,360 40,280 40,120"/>
  <line x1="200" y1="40" x2="200" y2="200"/>
  <line x1="200" y1="200" x2="40" y2="280"/>
  <line x1="200" y1="200" x2="360" y2="280"/>
  <!-- Circulo inscrito -->
  <circle cx="200" cy="200" r="130" stroke-dasharray="8 6"/>
  <!-- Linhas de construcao -->
  <line x1="40" y1="120" x2="360" y2="280" stroke-dasharray="3 5"/>
  <line x1="360" y1="120" x2="40" y2="280" stroke-dasharray="3 5"/>
</svg>
